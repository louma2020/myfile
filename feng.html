<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>讀取 JSON 並顯示 d['四世']</title>
</head>
<body>
    <h2>讀取 feng.json 並顯示 d['四世'] 的內容</h2>
    <pre id="output"></pre>

    <script>
        // 使用 fetch 讀取 feng.json 檔案
        fetch('feng.json')
            .then(response => {
                if (!response.ok) {
                    throw new Error(`無法讀取檔案: ${response.status}`);
                }
                return response.json();
            })
            .then(d => {
                // 印出 d['四世'] 的內容
                const output = document.getElementById('output');
                if (d.hasOwnProperty('四世')) {
                    output.textContent = JSON.stringify(d['四世'], null, 2);
                } else {
                    output.textContent = '錯誤：找不到 key "四世"';
                }
            })
            .catch(error => {
                document.getElementById('output').textContent = `錯誤：${error.message}`;
            });
    </script>
</body>
</html>
